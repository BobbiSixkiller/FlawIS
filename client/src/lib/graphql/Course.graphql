fragment Course on Course {
  id
  name
  categories {
    id
    name
    slug
  }
  start
  end
  registrationEnd
  registrationForm {
    ...Form
  }
  maxAttendees
  description
  thumbnail
  price
  billing {
    ...FlawBilling
  }
  isPaid
  attending {
    ...CourseAttendee
  }
  createdAt
  updatedAt
}

fragment Form on Form {
  id
  course
  version
  fields {
    id
    type
    label
    required
    placeholder
    helpText
    selectOptions {
      value
      text
    }
    minFiles
    maxFiles
  }
  createdAt
  updatedAt
}

fragment FormSubmission on FormSubmission {
  form
  formVersion
  answers
}

fragment CourseSession on CourseSession {
  id
  course
  name
  description
  start
  end
  createdAt
  updatedAt
}

fragment CourseAttendee on CourseAttendee {
  id
  user {
    id
    name
    email
    telephone
    organization
    avatarUrl
  }
  course
  status
  application {
    ...FormSubmission
  }
  createdAt
  updatedAt
}

fragment Attendance on Attendance {
  attendee {
    id
    user {
      name
    }
    status
  }
  attendanceRecords {
    id
    online
    hoursAttended
  }
}

fragment Category on Category {
  id
  name
  slug
}

query courses($after: String, $first: Int, $sort: [CourseSortInput]!) {
  courses(after: $after, first: $first, sort: $sort) {
    totalCount
    edges {
      cursor
      node {
        ...Course
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query course($id: ObjectId!) {
  course(id: $id) {
    ...Course
  }
}

query attendance(
  $id: ObjectId!
  $after: String
  $first: Int
  $sort: [CourseAttendeeSortInput]!
) {
  course(id: $id) {
    attendance(after: $after, first: $first, sort: $sort) {
      totalCount
      pageInfo {
        hasNextPage
        endCursor
      }
      edges {
        cursor
        node {
          ...Attendance
        }
      }
      sessions {
        ...CourseSession
      }
    }
  }
}

mutation createCourse($data: CourseInput!) {
  createCourse(data: $data) {
    message
    data {
      ...Course
    }
  }
}

mutation deleteCourse($id: ObjectId!) {
  deleteCourse(id: $id) {
    message
    data {
      ...Course
    }
  }
}

mutation updateCourse($id: ObjectId!, $data: CourseInput!) {
  updateCourse(id: $id, data: $data) {
    message
    data {
      ...Course
    }
  }
}

mutation createCourseSession($data: CourseSessionInput!) {
  createCourseSession(data: $data) {
    message
    data {
      ...CourseSession
    }
  }
}

mutation updateCourseSession($id: ObjectId!, $data: CourseSessionInput!) {
  updateCourseSession(id: $id, data: $data) {
    message
    data {
      ...CourseSession
    }
  }
}

mutation deleteCourseSession($id: ObjectId!) {
  deleteCourseSession(id: $id) {
    message
    data {
      ...CourseSession
    }
  }
}

mutation createCourseAttendee(
  $courseId: ObjectId!
  $application: FormSubmissionInput!
  $billing: AttendeeBillingInput
) {
  createCourseAttendee(
    courseId: $courseId
    application: $application
    billing: $billing
  ) {
    message
    data {
      ...CourseAttendee
    }
  }
}

mutation updateCourseAttendee(
  $id: ObjectId!
  $application: FormSubmissionInput!
) {
  updateCourseAttendee(id: $id, application: $application) {
    message
    data {
      ...CourseAttendee
    }
  }
}

mutation deleteCourseAttendee($id: ObjectId!) {
  deleteCourseAttendee(id: $id) {
    message
    data {
      ...CourseAttendee
    }
  }
}

mutation changeCourseAttendeeStatus($id: ObjectId!, $status: Status!) {
  changeCourseAttendeeStatus(id: $id, status: $status) {
    message
    data {
      ...CourseAttendee
    }
  }
}

mutation updateAttendanceHours($id: ObjectId!, $hoursAttended: Float!) {
  updateAttendanceHours(id: $id, hoursAttended: $hoursAttended) {
    message
    data {
      hoursAttended
      online
      session {
        course
      }
    }
  }
}

mutation updateAttendanceOnline($id: ObjectId!, $online: Boolean!) {
  updateAttendanceOnline(id: $id, online: $online) {
    message
    data {
      hoursAttended
      online
      session {
        course
      }
    }
  }
}

query categories($search: String) {
  categories(search: $search) {
    ...Category
  }
}

mutation createCategory($data: CategoryInput!) {
  createCategory(data: $data) {
    message
    data {
      ...Category
    }
  }
}

mutation updateCategory($id: ObjectId!, $data: CategoryInput!) {
  updateCategory(id: $id, data: $data) {
    message
    data {
      ...Category
    }
  }
}

mutation deleteCategory($id: ObjectId!) {
  deleteCategory(id: $id) {
    message
    data {
      ...Category
    }
  }
}
