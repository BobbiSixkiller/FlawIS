name: Build and Deploy to Staging

on:
  push:
    branches:
      - staging

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [HyperV]
    environment: staging
    env:
      MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
      MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
      MINIO_USER: ${{ secrets.MINIO_USER }}
      MINIO_PASSWORD: ${{ secrets.MINIO_PASSWORD }}
      MINIO_ENDPOINT: ${{ vars.MINIO_ENDPOINT }}
      SECRET: ${{ secrets.SECRET }}
      MAIL_HOST: ${{ secrets.MAIL_HOST }}
      MAIL_PORT: ${{ secrets.MAIL_PORT }}
      MAIL_USER: ${{ secrets.MAIL_USER }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_FROM: ${{ vars.MAIL_FROM }}
      RMQ_URI: ${{ vars.RMQ_URI }}
      RMQ_EXCHANGE: ${{ vars.RMQ_EXCHANGE }}
      REDIS_URI: ${{ vars.REDIS_URI }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REDIRECT_URI: ${{ vars.GOOGLE_REDIRECT_URI }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Show Docker disk usage before cleanup
        run: |
          df -h
          docker system df

      - name: Bounded Docker cleanup
        run: |
          docker container prune -f
          docker image prune -af --filter "until=168h"
          docker builder prune -af --filter "until=168h" --keep-storage 10GB
          docker network prune -f
        continue-on-error: true

      - name: Check disk space after cleanup
        run: |
          MIN_AVAILABLE_KB=$((20 * 1024 * 1024))
          AVAILABLE_KB=$(df --output=avail / | tail -1)

          if [ "$AVAILABLE_KB" -lt "$MIN_AVAILABLE_KB" ]; then
            echo "Not enough free disk space. Need at least 20G free."
            df -h
            docker system df
            exit 1
          fi

      - name: Install MinIO client
        run: |
          mkdir -p "$HOME/bin"
          if [ ! -x "$HOME/bin/mc" ]; then
            wget https://dl.min.io/client/mc/release/linux-amd64/mc
            chmod +x mc
            mv mc "$HOME/bin"
          fi
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Dump production MongoDB
        run: |
          rm -rf ./backup
          docker exec flawis-mongo-1 sh -c 'rm -rf /data/backup && mongodump --uri="mongodb://localhost:27017/flawis" --out=/data/backup'
          docker cp flawis-mongo-1:/data/backup ./backup
          docker exec flawis-mongo-1 rm -rf /data/backup

      - name: Stop staging containers
        run: docker compose -f docker-compose.staging.yml -p flawis-staging down

      - name: Start staging data services
        run: docker compose -f docker-compose.staging.yml -p flawis-staging up -d mongo minio

      - name: Wait for MongoDB
        run: |
          MONGO_CONTAINER=$(docker compose -f docker-compose.staging.yml -p flawis-staging ps -q mongo)
          echo "Waiting for MongoDB to become healthy..."
          until [ "$(docker inspect -f '{{.State.Health.Status}}' "$MONGO_CONTAINER")" = "healthy" ]; do
            echo "MongoDB not healthy yet..."
            sleep 2
          done
          echo "MongoDB is healthy: $MONGO_CONTAINER"

      - name: Restore MongoDB backup
        run: |
          MONGO_CONTAINER=$(docker compose -f docker-compose.staging.yml -p flawis-staging ps -q mongo)
          docker exec "$MONGO_CONTAINER" mkdir -p /data/backup
          docker cp ./backup/flawis "$MONGO_CONTAINER":/data/backup/flawis
          docker exec "$MONGO_CONTAINER" sh -c 'mongorestore --drop --db flawis --uri="mongodb://mongo:27017" /data/backup/flawis'
          docker exec "$MONGO_CONTAINER" rm -rf /data/backup
          rm -rf ./backup

      - name: Wait for MinIO
        run: |
          echo "Waiting for MinIO to become ready..."
          until curl -f http://localhost:9100/minio/health/live 2>/dev/null; do
            echo "MinIO not ready yet..."
            sleep 2
          done
          echo "Staging MinIO is ready."

      - name: Sync MinIO data
        run: |
          mc alias set production http://localhost:9000 "$MINIO_USER" "$MINIO_PASSWORD"
          mc alias set staging http://localhost:9100 "$MINIO_USER" "$MINIO_PASSWORD"
          mc mirror production/ staging/
          mc anonymous set download staging/images
          mc anonymous set download staging/avatars

      - name: Check disk space before build
        run: |
          MIN_AVAILABLE_KB=$((20 * 1024 * 1024))
          AVAILABLE_KB=$(df --output=avail / | tail -1)

          if [ "$AVAILABLE_KB" -lt "$MIN_AVAILABLE_KB" ]; then
            echo "Not enough free disk space. Need at least 20G free."
            df -h
            docker system df
            exit 1
          fi

      - name: Build staging images
        run: docker compose -f docker-compose.staging.yml -p flawis-staging build --parallel

      - name: Start staging services
        run: docker compose -f docker-compose.staging.yml -p flawis-staging up -d --no-build

      - name: Show Docker disk usage after deploy
        run: |
          df -h
          docker system df
